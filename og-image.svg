<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Arial, sans-serif">
  <rect width="1200" height="630" fill="#0b0e12"/>
  <!-- subtle grid -->
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#28303b" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- wordmark -->
  <text x="90" y="300" font-size="130" font-weight="800" letter-spacing="1" fill="#eaf0f6">STANCE<tspan fill="#31c8ff">/</tspan></text>
  <text x="96" y="366" font-size="34" fill="#8b97a6">Alloy wheel &amp; tyre fitment — poke, offset, rolling radius &amp; speedo error</text>

  <!-- pill row -->
  <g font-size="26" font-weight="700">
    <rect x="96" y="410" width="150" height="50" rx="25" fill="rgba(49,200,255,0.14)"/>
    <text x="171" y="443" text-anchor="middle" fill="#31c8ff">POKE</text>
    <rect x="262" y="410" width="160" height="50" rx="25" fill="rgba(255,122,51,0.14)"/>
    <text x="342" y="443" text-anchor="middle" fill="#ff7a33">OFFSET</text>
    <rect x="438" y="410" width="210" height="50" rx="25" fill="rgba(47,210,122,0.14)"/>
    <text x="543" y="443" text-anchor="middle" fill="#2fd27a">CLEARANCE</text>
  </g>

  <!-- cross-section wheel on the right -->
  <g transform="translate(910,315)">
    <line x1="0" y1="-210" x2="0" y2="210" stroke="#8b97a6" stroke-width="2" stroke-dasharray="4 8" opacity="0.7"/>
    <rect x="-70" y="-200" width="140" height="150" rx="24" fill="rgba(49,200,255,0.10)" stroke="#31c8ff" stroke-width="6"/>
    <rect x="-70" y="50" width="140" height="150" rx="24" fill="rgba(49,200,255,0.10)" stroke="#31c8ff" stroke-width="6"/>
    <rect x="-40" y="-50" width="80" height="100" rx="10" fill="#5c6675" opacity="0.5"/>
  </g>
</svg>
